<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pro Tasks</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="app-logo">
                <i class="fas fa-check-double"></i>
                <span>Pro Tasks</span>
            </div>
            <div class="user-profile">
                <span class="user-email">
                    <i class="fas fa-user-circle"></i> {{ current_user.email }}
                    <span class="pro-badge">PRO</span>
                </span>
                <a href="{{ url_for('logout') }}" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </header>

        <main>
            <!-- Add Todo Card -->
            <div class="entry-card glass">
                <form id="todo-form">
                    <div class="main-input-wrapper">
                        <input type="text" id="todo-title" placeholder="What needs to be done?" required autocomplete="off">
                        <button type="submit" class="add-btn">
                            <i class="fas fa-plus"></i> Add
                        </button>
                    </div>
                    <div class="entry-options">
                        <select id="todo-priority" class="styled-select">
                            <option value="low">Low Priority</option>
                            <option value="medium" selected>Medium Priority</option>
                            <option value="high">High Priority</option>
                        </select>
                        <select id="todo-category" class="styled-select">
                            <option value="General">General</option>
                            <option value="Work">Work</option>
                            <option value="Personal">Personal</option>
                            <option value="Shopping">Shopping</option>
                        </select>
                        <input type="date" id="todo-due" class="styled-date">
                    </div>
                </form>
            </div>

            <!-- Search & Actions Toolbar -->
            <div class="search-sort-bar">
                <div class="search-input-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" class="styled-input" placeholder="Search tasks...">
                </div>
                <div class="actions-wrapper">
                    <select id="sort-select" class="styled-select">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="due-date">Due Date</option>
                        <option value="priority">Priority</option>
                    </select>
                    <button id="analytics-btn" class="action-styled-btn">
                        <i class="fas fa-chart-pie"></i> Analytics
                    </button>
                    <button id="export-btn" class="action-styled-btn">
                        <i class="fas fa-file-export"></i> Export CSV
                    </button>
                </div>
            </div>

            <!-- Toolbar (Stats & Filters) -->
            <div class="toolbar">
                <div class="stats">
                    <span id="stat-total">0 items</span>
                    <span id="stat-completed">0 completed</span>
                </div>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>

            <!-- Todo List -->
            <div class="todo-list" id="todo-container">
                <!-- Items inject here -->
                <div class="empty-state">
                    <i class="fas fa-clipboard-check"></i>
                    <p>No tasks found. Add your first task above!</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h3>Edit Task</h3>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>Task Title</label>
                    <input type="text" id="edit-title" class="styled-input" required>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select id="edit-priority" class="styled-select">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="edit-category" class="styled-select">
                        <option value="General">General</option>
                        <option value="Work">Work</option>
                        <option value="Personal">Personal</option>
                        <option value="Shopping">Shopping</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" id="edit-due" class="styled-date">
                </div>
                <button type="submit" class="styled-btn" style="margin-top: 1rem;">Update Task</button>
            </form>
        </div>
    </div>

    <!-- Analytics Modal -->
    <div class="modal" id="analyticsModal">
        <div class="modal-content glass" style="max-width: 600px;">
            <div class="modal-header">
                <h3><i class="fas fa-chart-line"></i> Productivity Analytics</h3>
                <button class="close-btn" id="closeAnalyticsModal">&times;</button>
            </div>
            <div class="chart-container" style="position: relative; height:300px; width:100%">
                <canvas id="productivityChart"></canvas>
            </div>
            <div class="stats-grid">
                <div class="stat-box">
                    <h4 id="stat-completion-rate">0%</h4>
                    <p>Completion Rate</p>
                </div>
                <div class="stat-box">
                    <h4 id="stat-top-category">-</h4>
                    <p>Top Category</p>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
